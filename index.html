<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Volby Ústí nad Labem — mapa okrsků</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="" />
<style>
  :root {
    --bg: #f5f2ec;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #d4cfc4;
    --panel: #faf8f3;
    --accent: #b8341a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  header {
    border-bottom: 2px solid var(--ink);
    padding: 16px 28px 12px;
    background: var(--bg);
  }
  header h1 { margin: 0 0 2px; font-size: 22px; letter-spacing: -0.01em; }
  header p { margin: 0; font-size: 12px; color: var(--muted); font-family: 'Helvetica Neue', Arial, sans-serif; }
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: calc(100vh - 70px);
  }
  .main { display: flex; flex-direction: column; border-right: 1px solid var(--line); min-width: 0; }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
  }
  .control { display: flex; flex-direction: column; gap: 3px; }
  .control label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
  }
  select {
    padding: 5px 8px;
    border: 1px solid var(--ink);
    background: white;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  #map { flex: 1; background: #e8e3d8; }
  .legend-box {
    padding: 12px 20px;
    border-top: 1px solid var(--line);
    background: var(--panel);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    max-height: 140px;
    overflow-y: auto;
  }
  .legend-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .legend-parties {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 3px 16px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; }
  .legend-swatch { width: 18px; height: 12px; border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; }
  .legend-scale {
    height: 14px;
    border: 1px solid rgba(0,0,0,0.15);
    margin-top: 4px;
  }
  .legend-scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .side {
    padding: 20px 24px;
    background: var(--panel);
    overflow-y: auto;
    height: calc(100vh - 70px);
  }
  .side h2 {
    margin: 0 0 2px;
    font-size: 18px;
  }
  .side h2 .okr-num {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--muted);
    font-weight: 400;
    font-size: 13px;
  }
  .side .streets {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
    font-style: italic;
  }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    padding: 10px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .stat .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .stat .value { font-size: 17px; font-weight: 600; }
  .stat .sub { font-size: 11px; color: var(--muted); }
  .year-compare { margin-bottom: 14px; }
  .year-compare h4 {
    margin: 0 0 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .party-row {
    display: grid;
    grid-template-columns: 1fr 50px;
    gap: 4px 8px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    padding: 2px 0;
    align-items: center;
  }
  .party-row .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .party-row .bar-wrap {
    grid-column: 1 / -1;
    height: 3px;
    background: #e8e3d8;
  }
  .party-row .bar { height: 100%; }
  .party-row .pct { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .empty-side { color: var(--muted); font-style: italic; font-size: 13px; }
  .global-rank {
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .global-rank h4 {
    margin: 0 0 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .rank-row {
    display: grid;
    grid-template-columns: 1fr 60px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    padding: 3px 0;
    border-bottom: 1px dotted var(--line);
  }
  .rank-row .pct { text-align: right; font-variant-numeric: tabular-nums; }
  .okrsek-tooltip {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    line-height: 1.4;
  }
  .okrsek-tooltip .t-num { font-weight: 700; font-size: 13px; }
  .okrsek-tooltip .t-winner { font-weight: 600; }
  .obvod-label {
    pointer-events: none;
  }
  .obvod-label span {
    display: inline-block;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #1a1a1a;
    background: rgba(245, 242, 236, 0.85);
    padding: 3px 10px;
    border: 1px solid #1a1a1a;
    white-space: nowrap;
    text-shadow: 0 0 3px rgba(245,242,236,0.9);
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .side { height: auto; }
    #map { height: 60vh; }
  }
</style>
</head>
<body>
<header>
  <h1>Komunální volby Ústí nad Labem — mapa okrsků</h1>
  <p>97 okrsků ve 4 obvodech · data 2014 / 2018 / 2022 · hranice okrsků: ČÚZK 2022</p>
</header>
<div class="layout">
  <div class="main">
    <div class="controls">
      <div class="control">
        <label>Ročník</label>
        <select id="year">
          <option value="2025">2025 (parlamentní ⚠)</option>
          <option value="2022" selected>2022 (komunální)</option>
          <option value="2018">2018 (komunální)</option>
          <option value="2014">2014 (komunální)</option>
        </select>
      </div>
      <div class="control">
        <label>Obarvit podle</label>
        <select id="mode">
          <optgroup label="Základní">
            <option value="winner" selected>vítěz okrsku</option>
            <option value="party">% zvolené strany</option>
            <option value="ucast">účast</option>
            <option value="swing">změna vítěze 2018→2022</option>
          </optgroup>
          <optgroup label="Strategická analýza JU">
            <option value="zones">4 strategické zóny JU</option>
            <option value="ju_vs_ano">rozdíl JU vs ANO (p.b.)</option>
            <option value="ju_trend">trend JU 2018 → 2022</option>
            <option value="spici">počet spících voličů</option>
            <option value="vu_threat">ohrožení od Vaše Ústí</option>
          </optgroup>
          <optgroup label="Nálada 2025 (parlamentní)">
            <option value="ano_shift_25">posun k ANO 2022 → 2025</option>
            <option value="opposition_25">síla opozice 2025 (STAN+SPOLU+Piráti)</option>
            <option value="turnout_shift_25">skok účasti 2022 → 2025</option>
          </optgroup>
          <optgroup label="Syntéza">
            <option value="ohrozeni">INDEX OHROŽENÍ pro JU 2026</option>
          </optgroup>
        </select>
      </div>
      <div class="control" id="party-ctrl" style="display:none">
        <label>Strana</label>
        <select id="party"></select>
      </div>
      <div class="control">
        <label>Podkladová mapa</label>
        <select id="basemap">
          <option value="carto" selected>světlá (Carto)</option>
          <option value="osm">OpenStreetMap</option>
          <option value="none">žádná</option>
        </select>
      </div>
      <div class="control">
        <label>Obvody</label>
        <select id="obvody-toggle">
          <option value="on" selected>zobrazit hranice</option>
          <option value="off">skrýt</option>
        </select>
      </div>
    </div>
    <div id="map"></div>
    <div class="legend-box" id="legend"></div>
  </div>
  <div class="side" id="side">
    <div id="side-detail">
      <div class="empty-side">Najeď myší na okrsek pro detail. Klikni pro fixaci výběru.</div>
    </div>
    <div class="global-rank" id="global-rank"></div>
  </div>
</div>
<script>
function loadLeaflet() {
  return new Promise((resolve, reject) => {
    if (typeof L !== 'undefined') { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    script.crossOrigin = '';
    script.onload = resolve;
    script.onerror = () => reject(new Error('Nepodařilo se načíst Leaflet'));
    document.head.appendChild(script);
  });
}

function startApp() {
  loadLeaflet().then(initApp).catch(err => {
    const el = document.getElementById('map');
    if (el) el.innerHTML =
      '<div style="padding:20px;font-family:sans-serif;color:#6b6b6b">Chyba: ' + err.message + '. Zkuste obnovit stránku nebo otevřít soubor mimo artefakt.</div>';
  });
}

if (document.readyState === 'complete' || document.readyState === 'interactive') {
  startApp();
} else {
  window.addEventListener('DOMContentLoaded', startApp);
}

let currentYear = '2022';
let currentMode = 'winner';
let currentParty = null;
let selectedOkrsek = null;

function partyColor(name) { return PARTY_COLORS[name] || DEFAULT_COLOR; }


const OBVOD_COLORS = {
  'Město': '#1a1a1a',
  'Střekov': '#1a1a1a',
  'Neštěmice': '#1a1a1a',
  'Severní Terasa': '#1a1a1a'
};
let showObvody = true;
let obvodyLayer = null;
let obvodyLabelsLayer = null;

function getWinner(d) {
  let best = null, bestV = -1;
  for (const [p, o] of Object.entries(d.strany)) {
    if (o.v > bestV) { bestV = o.v; best = p; }
  }
  return best;
}

function scaleColor(v, min, max, hue) {
  if (max === min) return '#cccccc';
  const t = Math.max(0, Math.min(1, (v - min) / (max - min)));
  if (hue === 'heat') {
    const r = Math.round(255 - t * (255-184));
    const g = Math.round(245 - t * 200);
    const b = Math.round(210 - t * 184);
    return `rgb(${r},${g},${b})`;
  }
  if (hue === 'cool') {
    const r = Math.round(250 - t * 220);
    const g = Math.round(245 - t * 170);
    const b = Math.round(220 - t * 85);
    return `rgb(${r},${g},${b})`;
  }
  return '#cccccc';
}

// Pomocné: agregát Jedno Ústí podle roku
const JU_PARTIES = {
  '2022': ['PRO! Ústí', 'UFO', 'STAN'],
  '2018': ['PRO! Ústí', 'UFO', 'TOP 09, KDU-ČSL a STAN'],
  '2014': ['PRO! Ústí', 'UFO', 'TOP 09'],
  '2025': []  // parlamentní - koalice JU neexistuje jako taková
};
function juPct(d, year) {
  if (!d || !d.celkem) return 0;
  const parties = JU_PARTIES[year] || [];
  const sum = parties.reduce((s,p)=>s + (d.strany[p]?d.strany[p].v:0), 0);
  return sum/d.celkem*100;
}
function anoPct(d) {
  if (!d || !d.celkem) return 0;
  return (d.strany['ANO']?d.strany['ANO'].v:0)/d.celkem*100;
}
function vuPct(d) {
  if (!d || !d.celkem) return 0;
  return (d.strany['Vaše Ústí']?d.strany['Vaše Ústí'].v:0)/d.celkem*100;
}

function zoneFor(okr) {
  const d = VOLBY['2022'][okr];
  if (!d || !d.celkem) return null;
  const ju = juPct(d, '2022');
  const ano = anoPct(d);
  const lead = ju - ano;
  const ucast = d.ucast;
  if (lead > 10 && ucast >= 40) return 'A';
  if (lead > 0 && ucast < 40) return 'B';
  if (lead > -10 && lead <= 0) return 'C';
  if (lead <= -10 && ucast < 35 && d.volicu > 600) return 'D';
  if (lead <= -10) return 'E';
  return 'F';
}

const ZONE_COLORS = {
  'A': '#065f46',  // tmavě zelená — pevná bašta
  'B': '#10b981',  // zelená — bašta s potenciálem
  'C': '#f59e0b',  // jantar — bojiště
  'D': '#dc2626',  // červená — ztracené velké
  'E': '#7f1d1d',  // tmavě červená — ANO pevně
  'F': '#9ca3af'   // šedá
};
const ZONE_LABELS = {
  'A': 'Pevná bašta JU',
  'B': 'Bašta s potenciálem — MOBILIZOVAT',
  'C': 'Bojiště — PŘESVĚDČOVAT',
  'D': 'Velký okrsek, ztracené, mobilizace riziko',
  'E': 'Pevná bašta ANO',
  'F': 'Ostatní'
};

function fillFor(okr, d) {
  if (!d) return '#eee';
  if (currentMode === 'winner') return partyColor(getWinner(d));
  if (currentMode === 'party') {
    const o = d.strany[currentParty];
    if (!o) return '#f5f5f5';
    return scaleColor(o.p, 0, 50, 'heat');
  }
  if (currentMode === 'ucast') return scaleColor(d.ucast, 20, 55, 'cool');
  if (currentMode === 'swing') {
    const prev = VOLBY['2018'][okr];
    if (!prev) return '#eee';
    const w = getWinner(d), wp = getWinner(prev);
    if (w === wp) return '#e8e3d8';
    return partyColor(w);
  }
  if (currentMode === 'zones') {
    const z = zoneFor(okr);
    return z ? ZONE_COLORS[z] : '#eee';
  }
  if (currentMode === 'ju_vs_ano') {
    // Diverging: JU vede = zeleně, ANO vede = červeně
    const lead = juPct(d, currentYear) - anoPct(d);
    // normalized to [-30, +30]
    const t = Math.max(-1, Math.min(1, lead/30));
    if (t >= 0) {
      const x = t;
      const r = Math.round(245 - x*190);
      const g = Math.round(240 - x*145);
      const b = Math.round(220 - x*150);
      return `rgb(${r},${g},${b})`;
    } else {
      const x = -t;
      const r = Math.round(245 - x*25);
      const g = Math.round(240 - x*190);
      const b = Math.round(220 - x*190);
      return `rgb(${r},${g},${b})`;
    }
  }
  if (currentMode === 'ju_trend') {
    const d18 = VOLBY['2018'][okr];
    if (!d18) return '#eee';
    const delta = juPct(d, '2022') - juPct(d18, '2018');
    const t = Math.max(-1, Math.min(1, delta/25));
    if (t >= 0) {
      const x = t;
      const r = Math.round(245 - x*190);
      const g = Math.round(240 - x*145);
      const b = Math.round(220 - x*150);
      return `rgb(${r},${g},${b})`;
    } else {
      const x = -t;
      const r = Math.round(245 - x*25);
      const g = Math.round(240 - x*190);
      const b = Math.round(220 - x*190);
      return `rgb(${r},${g},${b})`;
    }
  }
  if (currentMode === 'spici') {
    const spici = d.volicu - d.volilo;
    return scaleColor(spici, 100, 1200, 'heat');
  }
  if (currentMode === 'vu_threat') {
    return scaleColor(vuPct(d), 0, 45, 'heat');
  }
  if (currentMode === 'ano_shift_25') {
    const d25 = VOLBY['2025'][okr];
    const d22 = VOLBY['2022'][okr];
    if (!d25 || !d22 || !d25.celkem || !d22.celkem) return '#eee';
    const ano25 = d25.strany['ANO'] ? d25.strany['ANO'].v/d25.celkem*100 : 0;
    const ano22 = d22.strany['ANO'] ? d22.strany['ANO'].v/d22.celkem*100 : 0;
    const delta = ano25 - ano22;
    // 0 to +60 p.b. heat scale (s průměrem +13 uprostřed)
    return scaleColor(delta, 0, 50, 'heat');
  }
  if (currentMode === 'opposition_25') {
    const d25 = VOLBY['2025'][okr];
    if (!d25 || !d25.celkem) return '#eee';
    const opp = ['STAN','SPOLU','Piráti'].reduce((s,p)=>s+(d25.strany[p]?d25.strany[p].v:0),0);
    return scaleColor(opp/d25.celkem*100, 10, 60, 'cool');
  }
  if (currentMode === 'turnout_shift_25') {
    const d25 = VOLBY['2025'][okr];
    const d22 = VOLBY['2022'][okr];
    if (!d25 || !d22) return '#eee';
    const delta = d25.ucast - d22.ucast;
    return scaleColor(delta, 5, 35, 'heat');
  }
  if (currentMode === 'ohrozeni') {
    const o = OHROZENI[okr];
    if (!o) return '#eee';
    // 0 = bezpečno (modré), 100 = maximum ohrožení (tmavě červené)
    const t = Math.max(0, Math.min(1, o.ohrozeni/100));
    // Diverging: pod 40 = zelené, 40-60 = žluté, nad 60 = červené
    if (t < 0.4) {
      const x = t / 0.4;
      const r = Math.round(60 + x*185);
      const g = Math.round(95 + x*150);
      const b = Math.round(70 + x*80);
      return `rgb(${r},${g},${b})`;
    } else if (t < 0.65) {
      const x = (t - 0.4) / 0.25;
      const r = Math.round(245 + x*5);
      const g = Math.round(245 - x*95);
      const b = Math.round(150 - x*100);
      return `rgb(${r},${g},${b})`;
    } else {
      const x = Math.min(1, (t - 0.65) / 0.35);
      const r = Math.round(250 - x*66);
      const g = Math.round(150 - x*116);
      const b = Math.round(50 - x*24);
      return `rgb(${r},${g},${b})`;
    }
  }
  return '#eee';
}

  zoomControl: true,

});

let geoLayer;
function buildLayer() {
  if (geoLayer) geoLayer.remove();
  geoLayer = L.geoJSON(GEO, {
    style: feature => styleFor(feature.properties.CISLO),
    onEachFeature: (feature, layer) => {
      const ok = feature.properties.CISLO;
      layer.on({
        mouseover: (e) => {
          layer.setStyle({weight: 2.5, color: '#1a1a1a'});
          layer.bringToFront();
          if (!selectedOkrsek) showSide(ok);
        },
        mouseout: (e) => {
          if (ok !== selectedOkrsek) layer.setStyle(styleFor(ok));
        },
        click: (e) => {
          L.DomEvent.stopPropagation(e);
          if (selectedOkrsek === ok) {
            selectedOkrsek = null;
            refresh();
            clearSide();
          } else {
            selectedOkrsek = ok;
            refresh();
            showSide(ok);
          }
        }
      });
      layer.bindTooltip(() => tooltipHtml(ok), {sticky: true, className: 'okrsek-tooltip'});
    }
  }).addTo(map);
  map.fitBounds(geoLayer.getBounds(), {padding: [20, 20]});
  buildObvodyLayer();
}

function buildObvodyLayer() {
  if (obvodyLayer) obvodyLayer.remove();
  if (obvodyLabelsLayer) obvodyLabelsLayer.remove();
  obvodyLayer = L.geoJSON(OBVODY_GEO, {
    style: feature => ({
      fillOpacity: 0,
      color: OBVOD_COLORS[feature.properties.obvod] || '#1a1a1a',
      weight: 4,
      opacity: 0.9,
      lineJoin: 'round',
      interactive: false
    })
  });
  // Vrstva popisků obvodů
  obvodyLabelsLayer = L.layerGroup();
  OBVODY_GEO.features.forEach(f => {
    const name = f.properties.obvod;
    // Získám centroid z bbox
    const bbox = L.geoJSON(f).getBounds();
    const c = bbox.getCenter();
    const icon = L.divIcon({
      className: 'obvod-label',
      html: `<span>${name}</span>`,
      iconSize: [140, 28],
      iconAnchor: [70, 14]
    });
    L.marker(c, {icon: icon, interactive: false, keyboard: false}).addTo(obvodyLabelsLayer);
  });
  if (showObvody) {
    obvodyLayer.addTo(map);
    obvodyLabelsLayer.addTo(map);
  }
}


function styleFor(ok) {
  const d = VOLBY[currentYear][ok];
  return {
    fillColor: fillFor(ok, d),
    fillOpacity: 0.75,
    weight: ok === selectedOkrsek ? 3 : 1,
    color: ok === selectedOkrsek ? '#b8341a' : '#4a4a4a',
    opacity: 1
  };
}

function refresh() {
  if (!geoLayer) return;
  geoLayer.eachLayer(layer => {
    const ok = layer.feature.properties.CISLO;
    layer.setStyle(styleFor(ok));
  });
  if (obvodyLayer && showObvody) obvodyLayer.bringToFront();
  renderLegend();
  renderGlobalRank();
}

function tooltipHtml(ok) {
  const d = VOLBY[currentYear][ok];
  if (!d) return `<div class="okrsek-tooltip">Okrsek ${ok} — bez dat pro ${currentYear}</div>`;
  const w = getWinner(d);
  let extra = '';
  if (currentMode === 'zones') {
    const z = zoneFor(ok);
    extra = z ? `<div style="margin-top:4px;font-weight:700;color:${ZONE_COLORS[z]}">Zóna ${z}: ${ZONE_LABELS[z]}</div>` : '';
  } else if (currentMode === 'ju_vs_ano') {
    const lead = juPct(d, currentYear) - anoPct(d);
    extra = `<div style="margin-top:4px">JU ${juPct(d,currentYear).toFixed(1)}% vs ANO ${anoPct(d).toFixed(1)}% <b>(${lead>=0?'+':''}${lead.toFixed(1)} p.b.)</b></div>`;
  } else if (currentMode === 'ju_trend') {
    const d18 = VOLBY['2018'][ok];
    if (d18) {
      const delta = juPct(d, '2022') - juPct(d18, '2018');
      extra = `<div style="margin-top:4px">JU 2018: ${juPct(d18,'2018').toFixed(1)}% → 2022: ${juPct(d,'2022').toFixed(1)}% <b>(${delta>=0?'+':''}${delta.toFixed(1)} p.b.)</b></div>`;
    }
  } else if (currentMode === 'spici') {
    extra = `<div style="margin-top:4px">Spící voliči: <b>${d.volicu - d.volilo}</b></div>`;
  } else if (currentMode === 'vu_threat') {
    extra = `<div style="margin-top:4px">Vaše Ústí: <b>${vuPct(d).toFixed(1)}%</b></div>`;
  } else if (currentMode === 'ano_shift_25') {
    const d25 = VOLBY['2025'][ok];
    const d22 = VOLBY['2022'][ok];
    if (d25 && d22 && d25.celkem && d22.celkem) {
      const ano25 = (d25.strany['ANO']?d25.strany['ANO'].v:0)/d25.celkem*100;
      const ano22 = (d22.strany['ANO']?d22.strany['ANO'].v:0)/d22.celkem*100;
      const delta = ano25 - ano22;
      extra = `<div style="margin-top:4px">ANO 2022: ${ano22.toFixed(1)}% → 2025: ${ano25.toFixed(1)}% <b>(${delta>=0?'+':''}${delta.toFixed(1)} p.b.)</b></div>`;
    }
  } else if (currentMode === 'opposition_25') {
    const d25 = VOLBY['2025'][ok];
    if (d25 && d25.celkem) {
      const opp = ['STAN','SPOLU','Piráti'].reduce((s,p)=>s+(d25.strany[p]?d25.strany[p].v:0),0);
      extra = `<div style="margin-top:4px">Opozice 2025 (STAN+SPOLU+Piráti): <b>${(opp/d25.celkem*100).toFixed(1)}%</b></div>`;
    }
  } else if (currentMode === 'turnout_shift_25') {
    const d25 = VOLBY['2025'][ok];
    const d22 = VOLBY['2022'][ok];
    if (d25 && d22) {
      const delta = d25.ucast - d22.ucast;
      extra = `<div style="margin-top:4px">Účast 2022: ${d22.ucast}% → 2025: ${d25.ucast}% <b>(+${delta.toFixed(1)} p.b.)</b></div>`;
    }
  } else if (currentMode === 'ohrozeni') {
    const o = OHROZENI[ok];
    if (o) {
      let label = 'bezpečno';
      if (o.ohrozeni > 75) label = 'KRITICKÉ OHROŽENÍ';
      else if (o.ohrozeni > 60) label = 'vysoké ohrožení';
      else if (o.ohrozeni > 45) label = 'střední ohrožení';
      else if (o.ohrozeni > 30) label = 'nízké ohrožení';
      extra = `<div style="margin-top:6px"><b style="font-size:13px">Index: ${o.ohrozeni}</b> — ${label}</div>
        <div style="margin-top:4px;font-size:11px;color:#6b6b6b">
          Posun k ANO 22→25: ${o.ano_shift>=0?'+':''}${o.ano_shift} p.b.<br>
          Pokles JU 18→22: ${o.ju_drop>=0?'+':''}${o.ju_drop} p.b.<br>
          Opozice 2025: ${o.opp25}%
        </div>`;
    }
  }
  return `<div class="okrsek-tooltip">
    <div class="t-num">Okrsek ${ok}</div>
    <div style="color:#6b6b6b">${d.obvod}</div>
    <div class="t-winner" style="color:${partyColor(w)}">${w} — ${d.strany[w].p}%</div>
    <div style="color:#6b6b6b">účast ${d.ucast}% · ${d.volilo}/${d.volicu}</div>
    ${extra}
  </div>`;
}

function clearSide() {
  document.getElementById('side-detail').innerHTML =
    '<div class="empty-side">Najeď myší na okrsek pro detail. Klikni pro fixaci výběru.</div>';
}

function showSide(ok) {
  const d = VOLBY[currentYear][ok];
  const side = document.getElementById('side-detail');
  if (!d) return;
  const sorted = Object.entries(d.strany).sort((a,b)=>b[1].v-a[1].v);
  const winner = sorted[0];

  const compareBlocks = ['2025','2022','2018','2014'].map(y => {
    const yd = VOLBY[y][ok];
    if (!yd) return '';
    const ys = Object.entries(yd.strany).sort((a,b)=>b[1].v-a[1].v).slice(0,5);
    const isCur = y === currentYear;
    const typ = y === '2025' ? 'parlamentní' : 'komunální';
    return `<div class="year-compare">
      <h4>${y} <span style="color:#9b9b9b;font-weight:400;font-size:11px">${typ}</span>${isCur ? ' · aktuální pohled' : ''} · účast ${yd.ucast}% · ${yd.volilo}/${yd.volicu}</h4>
      ${ys.map(([p,o])=>`
        <div class="party-row">
          <span class="name">${p}</span>
          <span class="pct">${o.p}%</span>
          <div class="bar-wrap"><div class="bar" style="width:${Math.min(100,o.p*2)}%;background:${partyColor(p)}"></div></div>
        </div>
      `).join('')}
    </div>`;
  }).join('');

  const o = OHROZENI[ok];
  let ohrozeniBlock = '';
  if (o) {
    let label = 'bezpečno', color = '#065f46';
    if (o.ohrozeni > 75) { label = 'KRITICKÉ OHROŽENÍ'; color = '#7f1d1d'; }
    else if (o.ohrozeni > 60) { label = 'vysoké ohrožení'; color = '#b8341a'; }
    else if (o.ohrozeni > 45) { label = 'střední ohrožení'; color = '#d97706'; }
    else if (o.ohrozeni > 30) { label = 'nízké ohrožení'; color = '#65a30d'; }
    ohrozeniBlock = `<div style="margin:10px 0;padding:10px 12px;border-left:3px solid ${color};background:#fafaf5">
      <div style="font-size:11px;color:#6b6b6b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px">Index ohrožení pro JU 2026</div>
      <div style="font-size:20px;font-weight:700;color:${color}">${o.ohrozeni} <span style="font-size:12px;font-weight:400">/ 100 — ${label}</span></div>
      <div style="font-size:11px;color:#6b6b6b;margin-top:6px;line-height:1.5">
        Posun k ANO 2022→2025: <b>${o.ano_shift>=0?'+':''}${o.ano_shift} p.b.</b><br>
        Pokles JU 2018→2022: <b>${o.ju_drop>=0?'+':''}${o.ju_drop} p.b.</b><br>
        Opozice v parl. 2025: <b>${o.opp25}%</b>
      </div>
    </div>`;
  }

  side.innerHTML = `
    <h2>Okrsek ${ok} <span class="okr-num">· ${d.obvod}</span></h2>
    <div class="streets">${d.ulice || '(bez popisu ulic)'}</div>
    <div class="stats">
      <div class="stat"><div class="label">Voličů</div><div class="value">${d.volicu}</div></div>
      <div class="stat"><div class="label">Volilo</div><div class="value">${d.volilo}</div><div class="sub">${d.ucast}% účast</div></div>
      <div class="stat"><div class="label">Vítěz ${currentYear}</div><div class="value" style="color:${partyColor(winner[0])}">${winner[0]}</div><div class="sub">${winner[1].p}%</div></div>
      <div class="stat"><div class="label">Celkem hlasů</div><div class="value">${d.celkem}</div></div>
    </div>
    ${ohrozeniBlock}
    ${compareBlocks}
  `;
}

function renderLegend() {
  const leg = document.getElementById('legend');
  if (currentMode === 'zones') {
    leg.innerHTML = `<div class="legend-title">4 strategické zóny pro Jedno Ústí (2022, agregát PRO!+UFO+STAN)</div>
      <div class="legend-parties">${['A','B','C','D','E','F'].map(z=>`
        <div class="legend-row"><span class="legend-swatch" style="background:${ZONE_COLORS[z]}"></span><span><b>${z}</b> — ${ZONE_LABELS[z]}</span></div>
      `).join('')}</div>`;
    return;
  }
  if (currentMode === 'ju_vs_ano') {
    leg.innerHTML = `<div class="legend-title">Rozdíl JU − ANO v p.b. (${currentYear}) · zeleně = vede JU, červeně = vede ANO</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(220,50,30), rgb(245,240,220), rgb(55,95,70))"></div>
      <div class="legend-scale-labels"><span>−30 p.b.</span><span>0</span><span>+30 p.b.</span></div>`;
    return;
  }
  if (currentMode === 'ju_trend') {
    leg.innerHTML = `<div class="legend-title">Změna JU 2018 → 2022 v p.b. · zeleně = růst, červeně = propad</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(220,50,30), rgb(245,240,220), rgb(55,95,70))"></div>
      <div class="legend-scale-labels"><span>−25 p.b.</span><span>0</span><span>+25 p.b.</span></div>`;
    return;
  }
  if (currentMode === 'spici') {
    leg.innerHTML = `<div class="legend-title">Spící voliči (voličů − volilo) ${currentYear}</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(255,245,210), rgb(184,45,26))"></div>
      <div class="legend-scale-labels"><span>100</span><span>~650</span><span>1200+</span></div>`;
    return;
  }
  if (currentMode === 'vu_threat') {
    leg.innerHTML = `<div class="legend-title">Podíl Vaše Ústí (${currentYear}) — hlavní konkurent JU v dělnických okrscích</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(255,245,210), rgb(184,45,26))"></div>
      <div class="legend-scale-labels"><span>0 %</span><span>22 %</span><span>45 % +</span></div>`;
    return;
  }
  if (currentMode === 'ano_shift_25') {
    leg.innerHTML = `<div class="legend-title">Posun k ANO: komunální 2022 → parlamentní 2025 (p.b.)</div>
      <div style="font-size:11px;color:#6b6b6b;margin-bottom:8px">Průměr +13 p.b. Tmavě červená = okrsky kde ANO radikálně posílilo = hlavní obranné priority pro JU.</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(255,245,210), rgb(184,45,26))"></div>
      <div class="legend-scale-labels"><span>0 p.b.</span><span>+25 p.b.</span><span>+50 p.b.</span></div>`;
    return;
  }
  if (currentMode === 'opposition_25') {
    leg.innerHTML = `<div class="legend-title">Síla opozice 2025: STAN + SPOLU + Piráti (% hlasů)</div>
      <div style="font-size:11px;color:#6b6b6b;margin-bottom:8px">Modře = okrsky kde liberálně/pravicová opozice drží — JU tam má pevný základ. Světle = ANO dominuje.</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(245,250,255), rgb(30,80,145))"></div>
      <div class="legend-scale-labels"><span>10 %</span><span>35 %</span><span>60 %</span></div>`;
    return;
  }
  if (currentMode === 'turnout_shift_25') {
    leg.innerHTML = `<div class="legend-title">Skok účasti: komunální 2022 → parlamentní 2025 (p.b.)</div>
      <div style="font-size:11px;color:#6b6b6b;margin-bottom:8px">Tmavě = okrsky s obrovským skokem účasti — jsou tam mobilizovatelní voliči. Velká příležitost pokud JU umí oslovit.</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(255,245,210), rgb(184,45,26))"></div>
      <div class="legend-scale-labels"><span>+5 p.b.</span><span>+20 p.b.</span><span>+35 p.b.</span></div>`;
    return;
  }
  if (currentMode === 'ohrozeni') {
    leg.innerHTML = `<div class="legend-title">Index ohrožení pro JU 2026 (syntéza 4 faktorů)</div>
      <div style="font-size:11px;color:#6b6b6b;margin-bottom:8px">
        Kompozitní skóre 0–100: <b>40%</b> posun k ANO 22→25, <b>30%</b> pokles JU 18→22, <b>20%</b> slabost opozice 2025, <b>10%</b> velikost okrsku.
        Zelené = bezpečné; žluté = bojiště; červené = ohrožení; tmavě červené = strukturální ztráta.
      </div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(60,95,70), rgb(245,245,150), rgb(250,150,50), rgb(184,34,26))"></div>
      <div class="legend-scale-labels"><span>0 (bezpečno)</span><span>50 (bojiště)</span><span>100 (ztraceno)</span></div>`;
    return;
  }
  if (currentMode === 'winner') {
    const data = VOLBY[currentYear];
    const winners = {};
    for (const d of Object.values(data)) {
      const w = getWinner(d);
      winners[w] = (winners[w]||0) + 1;
    }
    const sorted = Object.entries(winners).sort((a,b)=>b[1]-a[1]);
    leg.innerHTML = `<div class="legend-title">Vítězná strana v okrscích (${currentYear})</div>
      <div class="legend-parties">${sorted.map(([p,n])=>`
        <div class="legend-row"><span class="legend-swatch" style="background:${partyColor(p)}"></span><span>${p} — ${n} okr.</span></div>
      `).join('')}</div>`;
  } else if (currentMode === 'party') {
    leg.innerHTML = `<div class="legend-title">${currentParty} — podíl hlasů (${currentYear})</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(255,245,210), rgb(184,45,26))"></div>
      <div class="legend-scale-labels"><span>0 %</span><span>25 %</span><span>50 % +</span></div>`;
  } else if (currentMode === 'ucast') {
    leg.innerHTML = `<div class="legend-title">Volební účast (${currentYear})</div>
      <div class="legend-scale" style="background:linear-gradient(to right, rgb(250,245,220), rgb(30,75,135))"></div>
      <div class="legend-scale-labels"><span>20 %</span><span>37 %</span><span>55 % +</span></div>`;
  } else if (currentMode === 'swing') {
    const data = VOLBY[currentYear];
    const prev = VOLBY['2018'];
    let changed = 0, same = 0;
    for (const [ok,d] of Object.entries(data)) {
      if (!prev[ok]) continue;
      if (getWinner(d) === getWinner(prev[ok])) same++; else changed++;
    }
    leg.innerHTML = `<div class="legend-title">Změna vítězné strany 2018 → 2022</div>
      <div class="legend-row" style="margin-bottom:4px"><span class="legend-swatch" style="background:#e8e3d8"></span><span>Stejný vítěz jako 2018 — ${same} okrsků</span></div>
      <div class="legend-row"><span class="legend-swatch" style="background:#1f4788"></span><span>Nový vítěz — ${changed} okrsků (barva = nový vítěz)</span></div>`;
  }
}

function renderGlobalRank() {
  const data = VOLBY[currentYear];
  const totals = {};
  let grand = 0;
  for (const d of Object.values(data)) {
    for (const [p,o] of Object.entries(d.strany)) {
      totals[p] = (totals[p]||0) + o.v;
      grand += o.v;
    }
  }
  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  document.getElementById('global-rank').innerHTML = `<h4>Celkové pořadí ${currentYear} (celé město)</h4>` +
    sorted.map(([p,v])=>{
      const pct = (v/grand*100).toFixed(1);
      return `<div class="rank-row">
        <span><span style="display:inline-block;width:10px;height:10px;background:${partyColor(p)};margin-right:6px;vertical-align:middle"></span>${p}</span>
        <span class="pct">${pct}%</span>
      </div>`;
    }).join('');
}

// Controls
document.getElementById('year').addEventListener('change', e => {
  currentYear = e.target.value;
  populatePartySelect();
  refresh();
  if (selectedOkrsek) showSide(selectedOkrsek);
});
document.getElementById('mode').addEventListener('change', e => {
  currentMode = e.target.value;
  document.getElementById('party-ctrl').style.display = currentMode === 'party' ? 'flex' : 'none';
  refresh();
});
document.getElementById('party').addEventListener('change', e => {
  currentParty = e.target.value;
  refresh();
});
document.getElementById('basemap').addEventListener('change', e => {
  if (activeBasemap) map.removeLayer(activeBasemap);
  if (e.target.value === 'none') { activeBasemap = null; return; }
  activeBasemap = BASEMAPS[e.target.value].addTo(map);
  if (geoLayer) geoLayer.bringToFront();
  if (obvodyLayer && showObvody) { obvodyLayer.bringToFront(); }
});
document.getElementById('obvody-toggle').addEventListener('change', e => {
  showObvody = e.target.value === 'on';
  if (!obvodyLayer) return;
  if (showObvody) {
    obvodyLayer.addTo(map);
    obvodyLabelsLayer.addTo(map);
    obvodyLayer.bringToFront();
  } else {
    obvodyLayer.remove();
    obvodyLabelsLayer.remove();
  }
});

function populatePartySelect() {
  const data = VOLBY[currentYear];
  const parties = new Set();
  for (const d of Object.values(data)) for (const p of Object.keys(d.strany)) parties.add(p);
  const sel = document.getElementById('party');
  const cur = currentParty;
  sel.innerHTML = '';
  const arr = [...parties].sort();
  for (const p of arr) {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  }
  if (cur && arr.includes(cur)) sel.value = cur;
  else currentParty = sel.value;
}
populatePartySelect();
buildLayer();
refresh();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && selectedOkrsek) {
    selectedOkrsek = null;
    refresh();
    clearSide();
  }
});

} // end of initApp
</script>
</body>
</html>
